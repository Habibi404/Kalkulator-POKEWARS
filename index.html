<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator PokeWars</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 400px; }
        .game-bar { background: linear-gradient(180deg, #3b82f6 0%, #2563eb 100%); padding: 15px; border-radius: 12px; margin-bottom: 15px; color: white; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .label { font-size: 13px; opacity: 0.9; margin-bottom: 5px; display: block; }
        .value { font-size: 18px; font-weight: bold; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #1e293b; color: white; margin-bottom: 15px; box-sizing: border-box; }
        h2 { text-align: center; font-size: 20px; margin-bottom: 20px; color: #60a5fa; }
    </style>
</head>
<body>

<div class="container">
    <h2>Kalkulator PokeWars</h2>

    <input type="text" id="jeny" placeholder="Wpisz Jeny..." oninput="oblicz()">
    <div class="game-bar">
        <span class="label">Wydane na trening:</span>
        <div id="trening" class="value">0 ¥</div>
    </div>
    <div class="game-bar" style="background: linear-gradient(180deg, #10b981 0%, #059669 100%);">
        <span class="label">Wartość w hodowli:</span>
        <div id="hodo" class="value">0 ¥</div>
    </div>

    <h2 style="margin-top: 30px;">Kantor PH</h2>
    <input type="text" id="phInput" placeholder="Wpisz PH..." oninput="obliczKantor()">
    <div class="game-bar">
        <span class="label">Na Jeny:</span>
        <div id="wynikJeny" class="value">0 ¥</div>
    </div>
    <input type="text" id="jenyInput" placeholder="Wpisz Jeny..." oninput="obliczKantorOdwrotka()">
    <div class="game-bar" style="background: linear-gradient(180deg, #10b981 0%, #059669 100%);">
        <span class="label">Na PH:</span>
        <div id="wynikPH" class="value">0 PH</div>
    </div>
</div>

<script>
    function oblicz() {
        let val = parseFloat(document.getElementById('jeny').value.replace(/[^0-9]/g, '')) || 0;
        document.getElementById('trening').innerText = Math.round(val * 1.6666666666666667).toLocaleString('pl-PL') + ' ¥';
        document.getElementById('hodo').innerText = Math.round(val * 1.32).toLocaleString('pl-PL') + ' ¥';
    }
    function obliczKantor() {
        let ph = parseFloat(document.getElementById('phInput').value.replace(/[^0-9]/g, '')) || 0;
        document.getElementById('wynikJeny').innerText = (ph * 12000).toLocaleString('pl-PL') + ' ¥';
    }
    function obliczKantorOdwrotka() {
        let jeny = parseFloat(document.getElementById('jenyInput').value.replace(/[^0-9]/g, '')) || 0;
        // Używamy Number.toLocaleString, który sam dba o brak zbędnych zer
        let ph = jeny / 12000;
        document.getElementById('wynikPH').innerText = ph.toLocaleString('pl-PL', { maximumFractionDigits: 2 }) + ' PH';
    }
</script>
</body>
</html>
