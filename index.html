<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator PokeWars</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f0f1a; color: white; display: flex; justify-content: center; padding: 20px; }
        .card { background: #1a1a2e; padding: 20px; border-radius: 20px; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #7289da; text-align: center; margin-bottom: 20px; }
        h3 { color: #aaa; font-size: 16px; margin-top: 25px; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 5px; text-align: center; }
        input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #333; background: #161625; color: white; box-sizing: border-box; font-size: 16px; margin-bottom: 10px; }
        .result-bar { background: #252545; padding: 12px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid #7289da; }
        .result-bar.green { border-left-color: #00ff88; }
        .label { font-size: 13px; color: #bbb; }
        .value { font-size: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>Kalkulator PokeWars</h2>
    
    <input type="text" id="jeny" placeholder="Wpisz Jeny (np. 1000)" oninput="obliczHodo()">
    <div class="result-bar">
        <span class="label">Wydane Jeny na trening:</span>
        <span id="trening" class="value">0 ¥</span>
    </div>
    <div class="result-bar green">
        <span class="label">Wartość Hodo:</span>
        <span id="hodo" class="value">0 ¥</span>
    </div>

    <h3>Kantor PH (1 PH = 12.000 ¥)</h3>
    <input type="text" id="phInput" placeholder="Wpisz PH..." oninput="obliczKantor()">
    <div class="result-bar">
        <span class="label">Na Jeny:</span>
        <span id="wynikJeny" class="value">0 ¥</span>
    </div>
    <input type="text" id="jenyInput" placeholder="Wpisz Jeny..." oninput="obliczKantorOdwrotka()">
    <div class="result-bar green">
        <span class="label">Na PH:</span>
        <span id="wynikPH" class="value">0 PH</span>
    </div>
</div>

<script>
    function obliczHodo() {
        let czysta = document.getElementById('jeny').value.replace(/[^0-9]/g, '');
        let wartosc = parseFloat(czysta) || 0;
        document.getElementById('trening').innerText = Math.round(wartosc * 1.6666666666666667).toLocaleString('pl-PL') + ' ¥';
        document.getElementById('hodo').innerText = Math.round(wartosc * 1.32).toLocaleString('pl-PL') + ' ¥';
    }

    function obliczKantor() {
        let czysta = document.getElementById('phInput').value.replace(/[^0-9]/g, '');
        let ph = parseFloat(czysta) || 0;
        document.getElementById('wynikJeny').innerText = (ph * 12000).toLocaleString('pl-PL') + ' ¥';
    }

    function obliczKantorOdwrotka() {
        let czysta = document.getElementById('jenyInput').value.replace(/[^0-9]/g, '');
        let jeny = parseFloat(czysta) || 0;
        document.getElementById('wynikPH').innerText = (jeny / 12000).toFixed(2).replace('.', ',') + ' PH';
    }
</script>
</body>
</html>
