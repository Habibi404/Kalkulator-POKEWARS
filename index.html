<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator POKEWARS</title>
    <style>
        body { font-family: sans-serif; background: #0f0f1a; color: white; display: flex; justify-content: center; padding: 20px; }
        .card { background: #1a1a2e; padding: 25px; border-radius: 20px; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { text-align: center; color: #7289da; margin-bottom: 20px; }
        .input-group { margin-bottom: 20px; }
        input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #333; background: #161625; color: white; box-sizing: border-box; font-size: 16px; }
        .checkbox-group { margin-bottom: 20px; display: flex; flex-direction: column; gap: 8px; }
        
        .result-bar { background: #252545; padding: 15px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid #7289da; }
        .result-bar.green { border-left-color: #00ff88; }
        .label { font-size: 14px; color: #bbb; }
        .value { font-size: 16px; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>Kalkulator Hodowli</h2>
    <div class="input-group">
        <input type="number" id="jeny" placeholder="Wpisz wydane Jeny..." oninput="oblicz()">
    </div>
    <div class="checkbox-group">
        <label><input type="checkbox" id="premium" onchange="oblicz()"> Konto Premium (+20%)</label>
        <label><input type="checkbox" id="stow" onchange="oblicz()"> Stowarzyszenie (+10%)</label>
    </div>
    
    <div class="result-bar">
        <span class="label">Wydane na trening:</span>
        <span id="kosztTreningu" class="value">0</span>
    </div>
    <div class="result-bar green">
        <span class="label">Wartość w hodowli:</span>
        <span id="wartoscHodo" class="value">0</span>
    </div>
</div>

<script>
    function oblicz() {
        let jeny = parseFloat(document.getElementById('jeny').value) || 0;
        let koszt = jeny * 0.4;
        let podstawaHodo = jeny * 0.6;
        let mnoznik = 1.0;
        if(document.getElementById('premium').checked) mnoznik += 0.2;
        if(document.getElementById('stow').checked) mnoznik += 0.1;
        
        document.getElementById('kosztTreningu').innerText = Math.round(koszt);
        document.getElementById('wartoscHodo').innerText = Math.round(podstawaHodo * mnoznik);
    }
</script>
</body>
</html>
